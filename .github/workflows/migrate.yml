name: EF Migrations

on:
  push:
    branches:
      - main  # Change this to your default branch
  pull_request:
    branches:
      - main  # Change this to your default branch

jobs:
  ef-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: '9.x'  # Specify your .NET version

      - name: Restore dependencies
        run: dotnet restore

      - name: Run EF Migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}  # Use your connection string
        run: |
          dotnet new tool-manifest
          dotnet tool install dotnet-ef         
          dotnet tool restore  
          dotnet ef database update --project eKIBRA.Web
        # "${{ github.workspace }}/eKIBRA.Web/eKIBRA.Web.csproj" # Replace with your project name






